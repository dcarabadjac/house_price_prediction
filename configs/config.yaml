scraping:
  base_url: "https://999.md/ru/list/real-estate/apartments-and-rooms"
  delay: 5
  first_page: 61
  pages: 80

data:
  raw_prefix: "data/raw/apartments_raw"
  raw_path: "data/raw/apartments_raw_1-100.csv"
  raw_paths:
    # You can add more files here, for example:
    # - "data/raw/apartments_raw_2026-03-22_p1-2.csv"
    - "data/raw/apartments_raw_page_*.csv"
  interim_path: "data/interim/apartments_clean_1-66.csv"
  processed_path: "data/processed/apartments_data_1-66.csv"
  geocode_cache_path: "data/interim/geocode_cache.csv"
  enable_live_geocoding: true

train:
  test_size: 0.2
  n_estimators: 100
