scraping:
  base_url: "https://999.md/ru/list/real-estate/apartments-and-rooms"
  delay: 7
  first_page: 1
  pages: 276

data:
  raw_prefix: "data/raw/apartments_raw_15June"
  raw_path: "data/raw/apartments_raw_1-100.csv"
  raw_paths:
    # You can add more files here, for example:
    # - "data/raw/apartments_raw_2026-03-22_p1-2.csv"
    - "data/raw/apartments_raw_15June*.csv"
  interim_path: "data/interim/apartments_clean_15June_full.csv"
  processed_path: "data/processed/apartments_data_15June_full.csv"
  geocode_cache_path: "data/interim/geocode_cache.csv"
  enable_live_geocoding: true
  max_geocode_distance_m: 12000
  max_price_per_sqm: 6000

train:
  test_size: 0.2
  n_estimators: 100
